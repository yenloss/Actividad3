version: '3.8'

services:
  # 1. Nuestra Aplicación Web
  app-node:
    build: .
    container_name: app-node
    ports:
      - "3000:3000"

  # 2. El Agente que lee el hardware de la Computadora (CPU, RAM, Disco)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # Estos volúmenes permiten que el contenedor vea el hardware real de tu PC
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  # 3. La Base de Datos de Métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 4. El Visualizador Gráfico
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" # Entraremos a Grafana por el puerto 3001
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
