name: CI/CD Pipeline - Node.js to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Usamos una variable para convertir el nombre a minúsculas más adelante
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Forzamos minúsculas en las etiquetas generadas
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usamos lowercase para evitar el error de "Invalid reference format"
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/actividad3:main
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Definir el nombre de la imagen en minúsculas manualmente para mayor seguridad
            IMAGE_LOWER="ghcr.io/${{ github.repository_owner }}/actividad3"
            
            # 2. Login en el servidor
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Limpiar contenedores anteriores
            docker stop my-node-app || true
            docker rm my-node-app || true
            
            # 4. Bajar la nueva imagen
            docker pull ${IMAGE_LOWER}:main
            
            # 5. Levantar el contenedor (Puerto 80 del servidor al 80 del contenedor)
            docker run -d \
              --name my-node-app \
              -p 80:3000 \
              --restart always \
              ${IMAGE_LOWER}:main
