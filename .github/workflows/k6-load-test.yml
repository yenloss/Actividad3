name: K6 Load Test CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecución manual

jobs:
  k6_load_test:
    name: Run K6 Load Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start Express Server
        run: npm start &
        # El servidor tarda un poco en subir
      
      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 30000

      - name: Run k6 load test (Local)
        uses: grafana/k6-action@v0.3.1
        with:
          filename: test/load/load-test.js

      # Paso opcional para enviar a Grafana Cloud (requiere secretos)
